# Local Postgres for offline dev. Primary path is a Neon dev branch via
# .env.local — use this only when you can't reach the network.
#
#   docker compose up -d
#   DATABASE_URL=postgres://dev:dev@localhost:5432/betwixt npm run dev
#
# Tests do NOT need this — they use PGlite (in-process WASM) via
# tests/helpers/test-db.ts.
services:
  pg:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: betwixt
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'dev', '-d', 'betwixt']
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
